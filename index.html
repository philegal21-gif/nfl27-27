<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Spielplan 2026/2027</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --nfl-blue: #013369;
            --nfl-red: #D50A0A;
            --bg-color: #e2e8f0; 
            --card-bg: linear-gradient(145deg, #ffffff, #f0f0f0); 
            --text-main: #333333;
            --text-muted: #666666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* --- 3D HEADER MIT LOGOS --- */
        header {
            background: linear-gradient(135deg, #013369 0%, #001024 100%);
            color: white;
            text-align: center;
            padding: 2.5rem 1rem;
            position: relative;
            overflow: hidden;
            border-bottom: 6px solid var(--nfl-red);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 -3px 10px rgba(0,0,0,0.4);
            
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4vw;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 10px);
            pointer-events: none;
        }

        .header-logo {
            height: 90px;
            width: auto;
            position: relative;
            z-index: 10;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.6));
            transform: perspective(500px) translateZ(20px);
        }

        .header-text {
            position: relative;
            z-index: 10;
        }

        header h1 {
            font-family: 'Teko', sans-serif;
            font-size: 4.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.1;
            text-shadow: 1px 1px 0 #001024, 2px 2px 0 #001024, 3px 3px 0 #001024, 4px 4px 0 #001024, 5px 5px 15px rgba(0,0,0,0.8);
        }

        header .subtitle {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* --- 3D REITER (TABS) --- */
        .tab-container {
            display: flex;
            overflow-x: auto;
            background-color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            scrollbar-width: none; 
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .tab-container::-webkit-scrollbar {
            display: none;
        }

        .tab-button {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            color: var(--text-main);
            padding: 10px 20px;
            margin-right: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            white-space: nowrap;
            box-shadow: 0 4px 0 #cbd5e1, 0 5px 5px rgba(0,0,0,0.1);
            transition: all 0.1s ease;
            position: relative;
            top: 0;
        }

        .tab-button:hover {
            background-color: #fff;
            box-shadow: 0 4px 0 var(--nfl-blue), 0 5px 5px rgba(0,0,0,0.15);
            color: var(--nfl-blue);
        }

        .tab-button:active, .tab-button.active {
            background-color: var(--nfl-blue);
            color: white;
            box-shadow: 0 0 0 transparent, inset 0 3px 5px rgba(0,0,0,0.3);
            top: 4px; 
            border-color: var(--nfl-blue);
        }

        /* --- 3D SPIELKARTEN --- */
        .week-content {
            display: none;
            padding: 20px;
            max-width: 800px;
            margin: 20px auto;
        }

        .week-content.active {
            display: block;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 25px;
            padding: 20px;
            border-left: 6px solid var(--nfl-red);
            border-top: 1px solid rgba(255,255,255,0.8); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.08), 0 6px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 15px 30px rgba(0,0,0,0.12), 0 10px 10px rgba(0,0,0,0.08);
        }

        .game-date {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .matchup {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }

        .team img {
            width: 75px;
            height: 75px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.25));
            transition: transform 0.3s ease;
        }
        
        /* HIER IST DER STÄRKERE 3D-POP-EFFEKT FÜR DIE LOGOS */
        .game-card:hover .team img {
            transform: scale(1.35) rotate(-5deg);
        }

        .team-name {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 1px 1px 0 rgba(255,255,255,1);
        }

        .vs {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--nfl-blue);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* --- 3D SENDER LINKS --- */
        .broadcasters {
            background-color: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-around;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); 
        }

        .tv-link {
            text-decoration: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
            text-align: center;
            width: 45%;
            position: relative;
            top: 0;
            transition: all 0.1s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }

        .tv-us { 
            background-color: var(--nfl-blue); 
            box-shadow: 0 4px 0 #001f42, 0 5px 5px rgba(0,0,0,0.2);
        }
        .tv-de { 
            background-color: #e50914; 
            box-shadow: 0 4px 0 #99050d, 0 5px 5px rgba(0,0,0,0.2);
        }

        .tv-link:active {
            top: 4px;
            box-shadow: 0 0 0 transparent, inset 0 3px 5px rgba(0,0,0,0.4);
        }

        @media (max-width: 500px) {
            .team img { width: 55px; height: 55px; }
            .team-name { font-size: 1rem; }
            .tv-link { padding: 8px 10px; font-size: 0.8rem; }
            header h1 { font-size: 3rem; }
            .header-logo { height: 55px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://upload.wikimedia.org/wikipedia/en/a/a2/National_Football_League_logo.svg" alt="NFL Logo" class="header-logo">
        <div class="header-text">
            <h1>NFL Spielplan</h1>
            <div class="subtitle">Saison 2026 / 2027</div>
        </div>
        <img src="https://upload.wikimedia.org/wikipedia/en/a/a2/National_Football_League_logo.svg" alt="NFL Logo" class="header-logo">
    </header>
